name: restaurant-api-cd

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Publish
        run: dotnet publish ./src/Restaurants.API/Restaurants.API.csproj -c Release -o ./publish --no-build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-artifact
          path: ./publish

  deploy-dev:   
    environment:
      name: 'Dev'
      url: ${{steps.deploy-to-webapp.outputs.webapp-url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: api-artifact
          path: ./publish

      - name: Azure WebApp Deploy
        uses: Azure/webapps-deploy@v3
        id:  deploy-to-webapp
        with:
          app-name: restaurant-api-dev
          publish-profile: ${{ secrets.PUBLISH_PROFILE_DEV }}
          package: ./publish

  deploy-prod:
    environment:
      name: 'Prod'
      url: ${{steps.deploy-to-webapp.outputs.webapp-url }}
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: api-artifact
          path: ./publish

      - name: Azure WebApp Deploy
        uses: Azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: restaurant-api-prod
          publish-profile: ${{ secrets.PUBLISH_PROFILE_PROD }}
          package: ./publish
